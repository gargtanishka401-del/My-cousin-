<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cousin Website</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff0f5;
}

header {
  background: linear-gradient(45deg, #ff69b4, #ff1493);
  color: white;
  text-align: center;
  padding: 25px;
}

nav {
  background: #222;
  text-align: center;
  padding: 10px;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

section {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.gallery {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.gallery img {
  width: 150px;
  height: 150px;
  border-radius: 10px;
  object-fit: cover;
}

textarea {
  width: 100%;
  height: 100px;
  padding: 10px;
}

button {
  background: #ff1493;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 5px;
}

footer {
  text-align: center;
  background: #222;
  color: white;
  padding: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h1>💖 My Lovely Cousin Website 💖</h1>
  <p>Made with love for family</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#photos">Photos</a>
  <a href="#message">Message</a>
</nav>

<section id="home" class="card">
  <h2>Home</h2>
  <p>Welcome to our family website ❤️</p>
</section>

<section id="about" class="card">
  <h2>About</h2>
  <p>My cousin is very special, smart and amazing 💕</p>
</section>

<section id="photos" class="card">
  <h2>Memories 📸</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
  </div>
</section>

<section id="message" class="card">
  <h2>Leave a Message 💌</h2>
  <textarea id="msg" placeholder="Write something..."></textarea>
  <button onclick="showMsg()">Send</button>
  <p id="output"></p>
</section>

<footer>
  <p>Made with ❤️</p>
</footer>

<script>
function showMsg() {
  let msg = document.getElementById("msg").value;
  document.getElementById("output").innerHTML = "💌 You wrote: " + msg;
}
</script>

</body>
</html>
